<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Mode Events</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      background: #1c2410;
      color: #dddcd7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    img { width: 80px; height: 80px; mix-blend-mode: lighten; }
    h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
    p  { color: #7a9268; max-width: 30ch; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #2a3b19;
      color: #dddcd7;
      border: 1px solid #3d5a23;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3d5a23; }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Mode Events" />
  <h1>You're offline</h1>
  <p>Check your connection and try again. Pages you've visited recently are still available.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
